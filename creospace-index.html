// ADMIN PAGE — Salary & Incentive Cap Management
// ═══════════════════════════════════════════════════════════════════════════
const AdminPage=({users,setUsers,projects,setProjects,toast})=>{
  const [tab,setTab]=useState('salaries'); // salaries | caps
  const [editUser,setEditUser]=useState(null);
  const [editProj,setEditProj]=useState(null);
  const [salaryDraft,setSalaryDraft]=useState({});
  const [capDraft,setCapDraft]=useState({});

  // Open salary editor for a user
  const openSalary=(u)=>{setEditUser(u);setSalaryDraft({salary:u.salary});};
  const saveSalary=()=>{
    setUsers(prev=>prev.map(u=>u.id===editUser.id?{...u,salary:Number(salaryDraft.salary)||u.salary}:u));
    setEditUser(null);
    toast(`Salary updated for ${editUser.name}`);
  };

  // Open incentive cap editor for a project
  const openCaps=(p)=>{
    setEditProj(p);
    const d={};
    (p.assignedTeam||[]).forEach(uid=>{ d[uid]=p.targetIncentive?.[uid]||0; });
    setCapDraft(d);
  };
  const saveCaps=()=>{
    setProjects(prev=>prev.map(p=>{
      if(p.id!==editProj.id)return p;
      const ti={...p.targetIncentive};
      Object.entries(capDraft).forEach(([uid,val])=>{ ti[Number(uid)]=Number(val)||0; });
      return{...p,targetIncentive:ti};
    }));
    setEditProj(null);
    toast(`Incentive caps updated for ${editProj.name}`);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      {/* Admin badge */}
      <div style={{background:'linear-gradient(135deg,rgba(224,122,107,0.08),rgba(200,169,110,0.06))',border:'1px solid rgba(224,122,107,0.2)',borderRadius:13,padding:'13px 18px',display:'flex',gap:12,alignItems:'center'}}>
        <div style={{width:36,height:36,borderRadius:10,background:'rgba(224,122,107,0.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon n="admin" s={18}/></div>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--red)',marginBottom:2}}>Admin — Salary &amp; Incentive Management</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>Set fixed monthly salaries for all employees. Define the maximum incentive cap per employee per project. Employees cannot earn beyond the set cap.</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:0,background:'var(--tag-bg)',borderRadius:11,padding:4,alignSelf:'flex-start'}}>
        {[{id:'salaries',label:'💰 Fixed Salaries'},{id:'caps',label:'🔒 Incentive Caps'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'9px 20px',borderRadius:8,border:'none',background:tab===t.id?'var(--modal-bg)':'transparent',color:tab===t.id?'var(--gold)':'var(--text3)',fontSize:13,fontFamily:'var(--fb)',fontWeight:tab===t.id?600:400,cursor:'pointer',transition:'all 0.18s',boxShadow:tab===t.id?'var(--shadow)':'none'}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── SALARIES TAB ── */}
      {tab==='salaries'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <p style={{margin:0,fontSize:12,color:'var(--text3)'}}>Set the fixed monthly salary for each employee. This is the guaranteed base pay regardless of project performance.</p>
          <div style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:14,overflow:'hidden'}}>
            <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{margin:0,fontSize:14,fontFamily:'var(--fd)',color:'var(--text)'}}>Employee Salary Register</h3>
              <div style={{fontSize:11,color:'var(--text3)'}}>Total payroll: <span style={{color:'var(--gold)',fontWeight:600}}>{fmt(users.reduce((a,u)=>a+u.salary,0))}/mo</span></div>
            </div>
            {users.map(u=>{
              const projs=projects.filter(p=>p.assignedTeam?.includes(u.id));
              const maxInc=projs.reduce((s,p)=>s+(p.targetIncentive?.[u.id]||0),0);
              return(
                <div key={u.id} style={{padding:'14px 18px',borderBottom:'1px solid var(--border3)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <div style={{width:38,height:38,borderRadius:10,background:'rgba(200,169,110,0.1)',border:'1px solid rgba(200,169,110,0.18)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--gold)',flexShrink:0}}>{u.avatar}</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{u.name}</div>
                      <div style={{fontSize:11,color:'var(--text3)'}}>{u.dept} · <span style={{textTransform:'capitalize'}}>{u.seniority}</span></div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:2}}>Fixed Salary/mo</div>
                      <div style={{fontSize:18,fontWeight:700,color:'var(--green)',fontFamily:'var(--fd)'}}>{fmt(u.salary)}</div>
                    </div>
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:2}}>Max Incentive Cap</div>
                      <div style={{fontSize:15,fontWeight:600,color:'var(--red)'}}>{maxInc>0?fmt(maxInc):'—'}</div>
                    </div>
                    <div style={{textAlign:'center'}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:2}}>Annual CTC</div>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--blue)'}}>{fmt((u.salary+maxInc/4)*12)}</div>
                    </div>
                    <Btn size="sm" variant="secondary" onClick={()=>openSalary(u)}><Icon n="edit" s={12}/> Edit</Btn>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10}}>
            {[
              {l:'Total Monthly Payroll',v:fmt(users.reduce((a,u)=>a+u.salary,0)),c:'var(--green)'},
              {l:'Annual Payroll',v:fmt(users.reduce((a,u)=>a+u.salary,0)*12),c:'var(--gold)'},
              {l:'Total Incentive Caps',v:fmt(projects.reduce((a,p)=>a+Object.values(p.targetIncentive||{}).reduce((x,y)=>x+y,0),0)),c:'var(--red)'},
              {l:'Headcount',v:users.length,c:'var(--blue)'},
            ].map(s=>(
              <div key={s.l} style={{background:'var(--surface-alpha2)',borderRadius:11,padding:'13px 15px',textAlign:'center',border:'1px solid var(--border2)'}}>
                <div style={{fontSize:18,fontWeight:700,color:s.c,fontFamily:'var(--fd)'}}>{s.v}</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── INCENTIVE CAPS TAB ── */}
      {tab==='caps'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <p style={{margin:0,fontSize:12,color:'var(--text3)'}}>For each project, set the <strong style={{color:'var(--text2)'}}>maximum incentive</strong> each assigned employee can earn. This is a hard cap — earned incentive will never exceed this amount regardless of completion %.</p>
          <div style={{background:'rgba(224,122,107,0.05)',border:'1px solid rgba(224,122,107,0.18)',borderRadius:10,padding:'11px 15px',fontSize:12,color:'rgba(224,122,107,0.8)',display:'flex',gap:8,alignItems:'flex-start'}}>
            <Icon n="alert" s={13}/><span>Incentive = min( cap × (completion% / 100), cap ). Employees see this figure in their Salary page in real time.</span>
          </div>
          {projects.map(p=>{
            const team=users.filter(u=>p.assignedTeam?.includes(u.id));
            const totalCap=team.reduce((s,u)=>s+(p.targetIncentive?.[u.id]||0),0);
            return(
              <div key={p.id} style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:14,overflow:'hidden'}}>
                <div style={{padding:'13px 18px',borderBottom:'1px solid var(--border2)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.name}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{p.client} · <Badge text={p.status} type={p.status}/> · {p.completion}% complete</div>
                  </div>
                  <div style={{display:'flex',gap:12,alignItems:'center'}}>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Total Cap Pool</div>
                      <div style={{fontSize:15,fontWeight:700,color:'var(--red)'}}>{fmt(totalCap)}</div>
                    </div>
                    {team.length>0&&<Btn size="sm" variant="secondary" onClick={()=>openCaps(p)}><Icon n="edit" s={12}/> Edit Caps</Btn>}
                  </div>
                </div>
                {team.length===0?(
                  <div style={{padding:'16px 18px',fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>No team assigned yet. Use AI Assignment Engine to assign employees first.</div>
                ):(
                  team.map(u=>{
                    const cap=p.targetIncentive?.[u.id]||0;
                    const earned=Math.min(Math.round(cap*(p.completion/100)),cap);
                    const pct=cap>0?Math.round((earned/cap)*100):0;
                    return(
                      <div key={u.id} style={{padding:'12px 18px',borderBottom:'1px solid var(--border3)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                        <div style={{display:'flex',gap:10,alignItems:'center'}}>
                          <div style={{width:30,height:30,borderRadius:'50%',background:'rgba(200,169,110,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--gold)'}}>{u.avatar}</div>
                          <div>
                            <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{u.name}</div>
                            <div style={{fontSize:10,color:'var(--text3)'}}>{u.dept} · {u.seniority}</div>
                          </div>
                        </div>
                        <div style={{display:'flex',gap:14,alignItems:'center'}}>
                          <div style={{textAlign:'right'}}>
                            <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Incentive Cap</div>
                            <div style={{fontSize:15,fontWeight:700,color:'var(--red)'}}>{cap>0?fmt(cap):<span style={{color:'var(--text3)'}}>Not set</span>}</div>
                          </div>
                          <div style={{textAlign:'right'}}>
                            <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>Earned So Far</div>
                            <div style={{fontSize:14,fontWeight:600,color:pct>=100?'var(--green)':'var(--purple)'}}>{fmt(earned)}</div>
                          </div>
                          <div style={{width:80}}>
                            <div style={{fontSize:9,color:'var(--text3)',marginBottom:3}}>Cap usage: {pct}%</div>
                            <Bar v={pct} color={pct>=100?'var(--green)':pct>=70?'var(--gold)':'var(--blue)'} h={5}/>
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Edit Salary Modal */}
      <Modal open={!!editUser} onClose={()=>setEditUser(null)} title={`Edit Salary — ${editUser?.name}`} width={420}>
        {editUser&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{background:'var(--surface-alpha2)',borderRadius:10,padding:'12px 16px',display:'flex',gap:10,alignItems:'center'}}>
              <div style={{width:40,height:40,borderRadius:10,background:'rgba(200,169,110,0.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'var(--gold)'}}>{editUser.avatar}</div>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{editUser.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{editUser.dept} · <span style={{textTransform:'capitalize'}}>{editUser.seniority}</span></div>
              </div>
            </div>
            <Fld label="Fixed Monthly Salary (₹)">
              <Inp type="number" value={salaryDraft.salary} onChange={e=>setSalaryDraft(d=>({...d,salary:e.target.value}))} placeholder="55000"/>
            </Fld>
            <div style={{background:'rgba(200,169,110,0.06)',border:'1px solid rgba(200,169,110,0.15)',borderRadius:9,padding:'10px 14px',fontSize:11,color:'var(--text3)'}}>
              Annual CTC (salary only): <span style={{color:'var(--gold)',fontWeight:600}}>{fmt((Number(salaryDraft.salary)||0)*12)}</span>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
              <Btn variant="secondary" onClick={()=>setEditUser(null)}>Cancel</Btn>
              <Btn onClick={saveSalary} disabled={!salaryDraft.salary||Number(salaryDraft.salary)<=0}><Icon n="check" s={13}/> Save Salary</Btn>
            </div>
          </div>
        )}
      </Modal>

      {/* Edit Caps Modal */}
      <Modal open={!!editProj} onClose={()=>setEditProj(null)} title={`Edit Incentive Caps — ${editProj?.name}`} width={520}>
        {editProj&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{background:'rgba(224,122,107,0.06)',border:'1px solid rgba(224,122,107,0.18)',borderRadius:9,padding:'10px 14px',fontSize:11,color:'rgba(224,122,107,0.8)',display:'flex',gap:7,alignItems:'flex-start'}}>
              <Icon n="alert" s={12}/> This is the <strong>maximum</strong> each employee can earn from this project. Set to 0 to disable incentives for that employee.
            </div>
            {/* Project info */}
            <div style={{background:'var(--surface-alpha2)',borderRadius:10,padding:'11px 14px'}}>
              <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}}>{editProj.name}</div>
              <div style={{display:'flex',gap:14,fontSize:11,color:'var(--text3)',flexWrap:'wrap'}}>
                <span>Profit: <span style={{color:'var(--green)',fontWeight:600}}>{fmt(editProj.profit)}</span></span>
                <span>Completion: <span style={{color:'var(--gold)',fontWeight:600}}>{editProj.completion}%</span></span>
                <span>Status: <Badge text={editProj.status} type={editProj.status}/></span>
              </div>
            </div>
            {/* Per-employee cap inputs */}
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {users.filter(u=>editProj.assignedTeam?.includes(u.id)).map(u=>(
                <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:'var(--card-bg)',borderRadius:10,border:'1px solid var(--border2)'}}>
                  <div style={{width:34,height:34,borderRadius:9,background:'rgba(200,169,110,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--gold)',flexShrink:0}}>{u.avatar}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{u.name}</div>
                    <div style={{fontSize:10,color:'var(--text3)'}}>{u.seniority} · Base: {fmt(u.salary)}/mo</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:3,alignItems:'flex-end'}}>
                    <Fld label="Max Incentive (₹)">
                      <Inp type="number" min="0" value={capDraft[u.id]??0} onChange={e=>setCapDraft(d=>({...d,[u.id]:e.target.value}))} style={{width:130,textAlign:'right'}} placeholder="0"/>
                    </Fld>
                    {Number(capDraft[u.id])>0&&<div style={{fontSize:9,color:'var(--text3)'}}>Effective now: {fmt(Math.min(Math.round(Number(capDraft[u.id])*(editProj.completion/100)),Number(capDraft[u.id])))}</div>}
                  </div>
                </div>
              ))}
            </div>
            {/* Pool summary */}
            <div style={{background:'rgba(200,169,110,0.05)',border:'1px solid rgba(200,169,110,0.12)',borderRadius:9,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:12,color:'var(--text3)'}}>Total cap pool</span>
              <span style={{fontSize:16,fontWeight:700,color:'var(--gold)',fontFamily:'var(--fd)'}}>{fmt(Object.values(capDraft).reduce((a,v)=>a+Number(v||0),0))}</span>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
              <Btn variant="secondary" onClick={()=>setEditProj(null)}>Cancel</Btn>
              <Btn onClick={saveCaps}><Icon n="check" s={13}/> Save Incentive Caps</Btn>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════
// TEAM PAGE — with skill profiles & utilization
// ═══════════════════════════════════════════════════════════════════════════
const TeamPage=({users,projects,timesheets})=>{
  const [selected,setSelected]=useState(null);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <p style={{margin:0,fontSize:12,color:'var(--text3)'}}>Team skill profiles, utilization and project assignments — used by the AI assignment engine</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:13}}>
        {users.filter(u=>u.role!=='admin').map(u=>{
          const ts=timesheets.filter(t=>t.userId===u.id);
          const projs=projects.filter(p=>p.assignedTeam?.includes(u.id));
          const bh=ts.reduce((a,t)=>a+t.billingHours,0);
          const th=ts.reduce((a,t)=>a+t.billingHours+t.nonBillingHours,0);
          const br=th?Math.round((bh/th)*100):0;
          const inc=projs.reduce((s,p)=>s+Math.round((p.targetIncentive?.[u.id]||0)*(p.completion/100)),0);
          const ut=calcUtilization(u.id,timesheets,projects);
          const utCol=ut<=50?'var(--green)':ut<=75?'var(--gold)':ut<=90?'var(--orange)':'var(--red)';
          const topSkills=u.skills.sort((a,b)=>b.level-a.level).slice(0,4);
          return(
            <div key={u.id} style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:15,padding:'17px',cursor:'pointer',transition:'border-color 0.18s'}} onClick={()=>setSelected(selected===u.id?null:u.id)}>
              <div style={{display:'flex',gap:11,alignItems:'center',marginBottom:12}}>
                <div style={{width:42,height:42,borderRadius:11,background:'linear-gradient(135deg,rgba(200,169,110,0.16),rgba(200,169,110,0.04))',border:'1px solid rgba(200,169,110,0.18)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'var(--gold)'}}>{u.avatar}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{u.name}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{u.dept} · <span style={{textTransform:'capitalize'}}>{u.seniority}</span> · {u.expYears}yrs</div>
                </div>
                <Badge text={u.role} type={u.role}/>
              </div>
              <div style={{marginBottom:10}}><Util pct={ut}/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:11}}>
                {[{l:'Projects',v:projs.length},{l:'Bill Hrs',v:`${bh}h`},{l:'Bill Rate',v:`${br}%`},{l:'Incentives',v:fmt(inc)}].map(s=>(
                  <div key={s.l} style={{background:'var(--surface-alpha2)',borderRadius:8,padding:'6px 9px'}}><div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>{s.l}</div><div style={{fontSize:13,fontWeight:700,color:'var(--gold)'}}>{s.v}</div></div>
                ))}
              </div>
              {/* Top skills */}
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
                {topSkills.map(s=>{
                  const sk=SKILLS_DB.find(sk=>sk.id===s.skillId);
                  const col=s.level>=4?'var(--green)':s.level>=3?'var(--gold)':'var(--text3)';
                  return sk?<span key={s.skillId} style={{fontSize:9,padding:'2px 7px',borderRadius:5,background:'var(--surface-alpha2)',color:col,border:'1px solid var(--border2)'}}>{sk.name} L{s.level}</span>:null;
                })}
                {u.skills.length>4&&<span style={{fontSize:9,padding:'2px 7px',borderRadius:5,background:'var(--surface-alpha2)',color:'var(--text3)'}}>+{u.skills.length-4} more</span>}
              </div>
              {/* Expand */}
              {selected===u.id&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border2)',animation:'fadeUp 0.2s ease'}}>
                  <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Full Skill Profile</div>
                  <div style={{display:'flex',flexDirection:'column',gap:5}}>
                    {u.skills.map(s=>{
                      const sk=SKILLS_DB.find(sk=>sk.id===s.skillId);
                      const col=s.level>=4?'var(--green)':s.level>=3?'var(--gold)':s.level>=2?'var(--blue)':'var(--text3)';
                      return sk?(
                        <div key={s.skillId}>
                          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                            <span style={{color:'var(--text2)'}}>{sk.name}</span>
                            <span style={{color:col,fontWeight:600}}>{LEVEL_LABELS[s.level]}</span>
                          </div>
                          <Bar v={s.level} max={5} color={col} h={4}/>
                        </div>
                      ):null;
                    })}
                  </div>
                  <div style={{marginTop:10}}>
                    <div style={{fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>Active Projects</div>
                    {projs.map(p=>(
                      <div key={p.id} style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'4px 0',borderBottom:'1px solid var(--border3)'}}>
                        <span style={{color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}}>{p.name}</span>
                        <span style={{color:p.completion>=50?'var(--green)':'var(--gold)',fontWeight:600}}>{p.completion}%</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{textAlign:'center',fontSize:10,color:'var(--text3)',marginTop:6}}>{selected===u.id?'▲ Collapse':'▼ View skill profile'}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
