// AUTO-ASSIGNMENT ENGINE
// ═══════════════════════════════════════════════════════════════════════════
function calcUtilization(userId,timesheets,projects){
  const ts=timesheets.filter(t=>t.userId===userId);
  const assignedProjs=projects.filter(p=>p.assignedTeam?.includes(userId)&&p.status!=='completed');
  const loggedHrs=ts.reduce((a,t)=>a+(t.billingHours+t.nonBillingHours),0);
  const projectedHrs=assignedProjs.length*8;
  const total=Math.min(loggedHrs+projectedHrs,40);
  return Math.round((total/40)*100);
}

function scoreEmployee(emp,project,timesheets,allProjects){
  const util=calcUtilization(emp.id,timesheets,allProjects);
  // SKILL SCORE (40%)
  let skillScore=0,mandatoryMet=true,maxSkill=0;
  for(const req of project.skillReqs){
    const empSkill=emp.skills.find(s=>s.skillId===req.skillId);
    const weight=req.mandatory?1.5:0.8;
    maxSkill+=weight*100;
    if(!empSkill){if(req.mandatory){mandatoryMet=false;break;}continue;}
    const ratio=Math.min(empSkill.level/req.minLevel,1.5);
    skillScore+=ratio*weight*100;
  }
  skillScore=mandatoryMet&&maxSkill>0?Math.min((skillScore/maxSkill)*100,100):0;

  // UTILIZATION SCORE (30%)
  let utilScore=0;
  if(util<=40)utilScore=100;
  else if(util<=60)utilScore=80;
  else if(util<=75)utilScore=55;
  else if(util<=85)utilScore=25;
  else utilScore=0;

  // EXPERIENCE SCORE (20%)
  const senMap={junior:20,mid:50,senior:75,lead:90,principal:100};
  const expScore=senMap[emp.seniority]||30;

  // DEPT FIT (10%)
  const deptMap={'Architecture':['Residential','Commercial','Mixed Use','Industrial','Healthcare'],'Interior Design':['Residential','Commercial','Hospitality','Mixed Use']};
  const fits=(deptMap[emp.dept]||[]).includes(project.type);
  const deptScore=fits?100:45;

  const total=mandatoryMet?(skillScore*0.4+utilScore*0.3+expScore*0.2+deptScore*0.1):0;
  return{totalScore:Math.round(total*10)/10,skillScore:Math.round(skillScore),utilScore:Math.round(utilScore),expScore:Math.round(expScore),deptScore:Math.round(deptScore),util,mandatoryMet};
}

function autoAssign(project,timesheets,allProjects){
  const candidates=USERS.filter(u=>u.role==='user'||u.role==='hod');
  const scored=candidates.map(emp=>({emp,score:scoreEmployee(emp,project,timesheets,allProjects)}))
    .filter(x=>x.score.totalScore>0)
    .sort((a,b)=>b.score.totalScore-a.score.totalScore);

  // Greedy team selection
  const team=[];
  const coveredSkills=new Set();
  const maxSize=project.totalBilling>=5000000?5:project.totalBilling>=2000000?3:2;

  for(const c of scored){
    if(team.length>=maxSize)break;
    const empSkillIds=new Set(c.emp.skills.map(s=>s.skillId));
    const addsMandatory=project.skillReqs.filter(r=>r.mandatory&&!coveredSkills.has(r.skillId)&&empSkillIds.has(r.skillId)).length>0;
    const uncovered=project.skillReqs.filter(r=>r.mandatory&&!coveredSkills.has(r.skillId)).length>0;
    if(team.length===0||uncovered||addsMandatory||(c.score.totalScore>72&&team.length<2)){
      team.push(c);
      c.emp.skills.forEach(s=>coveredSkills.add(s.skillId));
    }
  }

  // Calculate incentives
  const pool=project.profit*0.15;
  const totalScoreSum=team.reduce((a,m)=>a+m.score.totalScore,0);
  const senMul={junior:0.7,mid:1.0,senior:1.3,lead:1.6,principal:2.0};
  team.forEach(m=>{
    const frac=m.score.totalScore/totalScoreSum;
    const mul=senMul[m.emp.seniority]||1;
    m.incentive=Math.round(pool*frac*mul);
    const months=(new Date(project.deadline)-new Date(project.startDate))/(1000*60*60*24*30);
    m.cost=Math.round((m.emp.salary/22)*months*0.8);
  });

  // Skill coverage
  const mandatorySkills=project.skillReqs.filter(r=>r.mandatory);
  const covered=mandatorySkills.filter(r=>coveredSkills.has(r.skillId)).length;
  return{team,allScored:scored,coverage:Math.round((covered/mandatorySkills.length)*100)||100};
}

// Score ring
const ScoreRing=({score,size=52})=>{
  const r=size/2-4,circ=2*Math.PI*r;
  const color=score>=80?'#7ec98c':score>=60?'#c8a96e':score>=40?'#e8935a':'#e07a6b';
  const dash=circ*(score/100);
  return(
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="4"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4"
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{transition:'stroke-dasharray 0.8s cubic-bezier(0.4,0,0.2,1)'}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        style={{transform:`rotate(90deg) translate(0,0)`,transformOrigin:`${size/2}px ${size/2}px`,fill:color,fontSize:size>48?12:10,fontWeight:700,fontFamily:'var(--fb)'}}>
        {score}
      </text>
    </svg>
  );
};

const BarChart=({data,color='var(--gold)'})=>{
  const mx=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:5,height:60}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
          <div style={{width:'100%',background:color,borderRadius:'3px 3px 0 0',height:`${(d.v/mx)*52}px`,opacity:i===data.length-1?1:0.38}}/>
          <span style={{fontSize:8,color:'var(--text3)'}}>{d.l}</span>
        </div>
      ))}
    </div>
  );
};

const NewProjectModal=({open,onClose,onCreated,existingCount})=>{
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:'',client:'',type:'Residential',status:'pre-award',phase:'Concept Design',completion:0,totalBilling:'',profit:'',startDate:today,deadline:'',estimatedHours:'',skillReqs:[]});
  const [selSkillId,setSelSkillId]=useState('');const [selMinLvl,setSelMinLvl]=useState(3);const [selMandatory,setSelMandatory]=useState(true);

  const addSkill=()=>{
    if(!selSkillId)return;
    const id=Number(selSkillId);
    if(form.skillReqs.find(r=>r.skillId===id))return;
    setForm(f=>({...f,skillReqs:[...f.skillReqs,{skillId:id,minLevel:selMinLvl,mandatory:selMandatory}]}));
    setSelSkillId('');
  };
  const removeSkill=id=>setForm(f=>({...f,skillReqs:f.skillReqs.filter(r=>r.skillId!==id)}));

  const submit=()=>{
    const p={...form,id:`P${String(existingCount+1).padStart(3,'0')}`,totalBilling:Number(form.totalBilling),profit:Number(form.profit),completion:Number(form.completion),estimatedHours:Number(form.estimatedHours),assignedTeam:[],costPerEmployee:{},targetIncentive:{}};
    onCreated(p);
    setStep(1);setForm({name:'',client:'',type:'Residential',status:'pre-award',phase:'Concept Design',completion:0,totalBilling:'',profit:'',startDate:today,deadline:'',estimatedHours:'',skillReqs:[]});
  };

  const bycat=SKILLS_DB.reduce((acc,s)=>{if(!acc[s.cat])acc[s.cat]=[];acc[s.cat].push(s);return acc;},{});

  if(!open)return null;
  return(
    <Modal open={open} onClose={onClose} title="Create New Project" width={640}>
      {/* Step tabs */}
      <div style={{display:'flex',gap:0,marginBottom:22,background:'var(--surface-alpha2)',borderRadius:10,padding:4}}>
        {[{n:1,l:'Project Details'},{n:2,l:'Skill Requirements'}].map(s=>(
          <button key={s.n} onClick={()=>setStep(s.n)} style={{flex:1,padding:'8px',borderRadius:7,border:'none',background:step===s.n?'rgba(200,169,110,0.15)':'transparent',color:step===s.n?'var(--gold)':'var(--text3)',fontSize:12,fontFamily:'var(--fb)',fontWeight:step===s.n?600:400,cursor:'pointer',transition:'all 0.18s',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <span style={{width:18,height:18,borderRadius:'50%',background:step===s.n?'var(--gold)':'rgba(255,255,255,0.08)',color:step===s.n?'#12100c':'var(--text3)',fontSize:10,display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{s.n}</span>
            {s.l}
          </button>
        ))}
      </div>

      {step===1&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
          <Fld label="Project Name"><Inp value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Skyline Residences…" style={{gridColumn:'span 2'}}/></Fld>
          <Fld label="Client"><Inp value={form.client} onChange={e=>setForm(f=>({...f,client:e.target.value}))} placeholder="Client company…"/></Fld>
          <Fld label="Project Type"><Sel value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>{PROJ_TYPES.map(t=><option key={t}>{t}</option>)}</Sel></Fld>
          <Fld label="Status"><Sel value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}><option value="pre-award">Pre-Award</option><option value="awarded">Awarded</option></Sel></Fld>
          <Fld label="Phase"><Sel value={form.phase} onChange={e=>setForm(f=>({...f,phase:e.target.value}))}>{PHASES.map(ph=><option key={ph}>{ph}</option>)}</Sel></Fld>
          <Fld label="Total Billing (₹)"><Inp type="number" value={form.totalBilling} onChange={e=>setForm(f=>({...f,totalBilling:e.target.value}))} placeholder="2800000"/></Fld>
          <Fld label="Profit (₹)"><Inp type="number" value={form.profit} onChange={e=>setForm(f=>({...f,profit:e.target.value}))} placeholder="840000"/></Fld>
          <Fld label="Start Date"><Inp type="date" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}/></Fld>
          <Fld label="Deadline"><Inp type="date" value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))}/></Fld>
          <Fld label="Estimated Hours"><Inp type="number" value={form.estimatedHours} onChange={e=>setForm(f=>({...f,estimatedHours:e.target.value}))} placeholder="1200"/></Fld>
          <Fld label="Initial Completion %"><Inp type="number" min="0" max="100" value={form.completion} onChange={e=>setForm(f=>({...f,completion:e.target.value}))}/></Fld>
          <div style={{gridColumn:'span 2',display:'flex',justifyContent:'flex-end',marginTop:4}}>
            <Btn onClick={()=>setStep(2)} disabled={!form.name||!form.client}>Next: Skill Requirements →</Btn>
          </div>
        </div>
      )}

      {step===2&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:'rgba(164,130,220,0.08)',border:'1px solid rgba(164,130,220,0.18)',borderRadius:10,padding:'12px 15px',fontSize:12,color:'rgba(164,130,220,0.8)',display:'flex',gap:8,alignItems:'flex-start'}}>
            <Icon n="robot" s={14}/><span>Define what skills this project needs. The AI engine will score and match the best team from your roster automatically.</span>
          </div>
          {/* Add skill */}
          <div style={{background:'var(--surface-alpha2)',borderRadius:11,border:'1px solid var(--border2)',padding:'14px'}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.08em'}}>Add Skill Requirement</div>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr auto',gap:8,alignItems:'flex-end'}}>
              <Fld label="Skill">
                <Sel value={selSkillId} onChange={e=>setSelSkillId(e.target.value)}>
                  <option value="">Select skill…</option>
                  {Object.entries(bycat).map(([cat,skills])=>(
                    <optgroup key={cat} label={cat}>
                      {skills.filter(s=>!form.skillReqs.find(r=>r.skillId===s.id)).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                    </optgroup>
                  ))}
                </Sel>
              </Fld>
              <Fld label="Min Level">
                <Sel value={selMinLvl} onChange={e=>setSelMinLvl(Number(e.target.value))}>
                  {[1,2,3,4,5].map(l=><option key={l} value={l}>{LEVEL_LABELS[l]}</option>)}
                </Sel>
              </Fld>
              <Fld label="Type">
                <Sel value={selMandatory?'mandatory':'optional'} onChange={e=>setSelMandatory(e.target.value==='mandatory')}>
                  <option value="mandatory">Mandatory</option>
                  <option value="optional">Optional</option>
                </Sel>
              </Fld>
              <Btn onClick={addSkill} disabled={!selSkillId} style={{marginBottom:0,alignSelf:'flex-end'}}><Icon n="plus" s={13}/> Add</Btn>
            </div>
          </div>
          {/* Skill list */}
          {form.skillReqs.length>0?(
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {form.skillReqs.map(r=>{
                const sk=SKILLS_DB.find(s=>s.id===r.skillId);
                return(
                  <div key={r.skillId} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'var(--surface-alpha2)',borderRadius:9,border:`1px solid ${r.mandatory?'rgba(200,169,110,0.15)':'rgba(255,255,255,0.07)'}`}}>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:r.mandatory?'var(--gold)':'var(--text3)',flexShrink:0}}/>
                      <span style={{fontSize:13,color:'var(--text)'}}>{sk?.name}</span>
                      <span style={{fontSize:10,color:'var(--text3)',background:'rgba(255,255,255,0.05)',borderRadius:5,padding:'1px 7px'}}>{sk?.cat}</span>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span style={{fontSize:11,color:'var(--gold)'}}>{LEVEL_LABELS[r.minLevel]}+</span>
                      <Badge text={r.mandatory?'Mandatory':'Optional'} type={r.mandatory?'awarded':'default'}/>
                      <button onClick={()=>removeSkill(r.skillId)} style={{background:'transparent',border:'none',color:'var(--red)',padding:2,cursor:'pointer'}}><Icon n="close" s={13}/></button>
                    </div>
                  </div>
                );
              })}
            </div>
          ):(
            <div style={{textAlign:'center',padding:'20px',color:'var(--text3)',fontSize:13,border:'1px dashed rgba(255,255,255,0.08)',borderRadius:10}}>No skill requirements added yet.<br/><span style={{fontSize:11,opacity:0.6}}>Add at least one mandatory skill for better AI matching.</span></div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
            <Btn variant="secondary" onClick={()=>setStep(1)}>← Back</Btn>
            <Btn onClick={submit} disabled={!form.name||!form.client}><Icon n="robot" s={13}/> Create & Run AI Assignment</Btn>
          </div>
        </div>
      )}
    </Modal>
  );
};

// ─── AI ENGINE MODAL ─────────────────────────────────────────────────────────
const AIEngineModal=({project,timesheets,allProjects,onClose,onAssign})=>{
  const [phase,setPhase]=useState('running'); // running | results | override
  const [result,setResult]=useState(null);
  const [overrideTeam,setOverrideTeam]=useState([]);
  const [confirmed,setConfirmed]=useState(false);

  useEffect(()=>{
    setPhase('running');
    const t=setTimeout(()=>{
      const r=autoAssign(project,timesheets,allProjects);
      setResult(r);
      setOverrideTeam(r.team.map(m=>m.emp.id));
      setPhase('results');
    },2200);
    return ()=>clearTimeout(t);
  },[project.id]);

  const confirm=()=>{
    if(phase==='override'){
      const sel=result.allScored.filter(s=>overrideTeam.includes(s.emp.id));
      const pool=project.profit*0.15;
      const total=sel.reduce((a,s)=>a+s.score.totalScore,0);
      const senM={junior:0.7,mid:1.0,senior:1.3,lead:1.6,principal:2.0};
      sel.forEach(s=>{const f=s.score.totalScore/total;const m=senM[s.emp.seniority]||1;s.incentive=Math.round(pool*f*m);s.cost=Math.round((s.emp.salary/22)*3*0.8);});
      onAssign(project.id,sel);
    }else{
      onAssign(project.id,result.team);
    }
    setConfirmed(true);
  };

  return(
    <Modal open={true} onClose={onClose} title="" width={680}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border2)'}}>
        <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,rgba(164,130,220,0.2),rgba(100,160,220,0.15))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon n="robot" s={20}/></div>
        <div>
          <div style={{fontSize:17,fontFamily:'var(--fd)',color:'var(--text)',fontWeight:600}}>AI Assignment Engine</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{project.name}</div>
        </div>
        <button onClick={onClose} style={{marginLeft:'auto',background:'transparent',border:'none',color:'var(--text3)',padding:4}}><Icon n="close" s={16}/></button>
      </div>

      {phase==='running'&&(
        <div style={{padding:'40px 20px',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
          <div style={{width:56,height:56,borderRadius:'50%',border:'3px solid rgba(164,130,220,0.3)',borderTopColor:'#a482dc',animation:'spin 0.8s linear infinite'}}/>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text)',marginBottom:6}}>Analysing your roster…</div>
            <div style={{fontSize:12,color:'var(--text3)'}}>Scoring all employees on skill match, utilization,<br/>seniority, and department fit</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,width:'100%',maxWidth:320}}>
            {['Scanning employee skill profiles…','Calculating current utilization…','Matching against project requirements…','Selecting optimal team…'].map((s,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'center',fontSize:12,color:'var(--text3)',animation:`fadeIn 0.4s ${i*0.4}s both`}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'#a482dc',animation:'pulse 1s infinite',animationDelay:`${i*0.2}s`,flexShrink:0}}/>
                {s}
              </div>
            ))}
          </div>
        </div>
      )}

      {phase==='results'&&result&&!confirmed&&(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {/* Summary bar */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[
              {l:'Skill Coverage',v:`${result.coverage}%`,c:'var(--green)'},
              {l:'Team Size',v:`${result.team.length} members`,c:'var(--gold)'},
              {l:'Incentive Pool',v:fmt(project.profit*0.15),c:'var(--purple)'},
            ].map(s=>(
              <div key={s.l} style={{background:'var(--surface-alpha2)',borderRadius:10,padding:'10px 14px',textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:700,color:s.c,fontFamily:'var(--fd)'}}>{s.v}</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* Recommended team */}
          <div>
            <div style={{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.09em',marginBottom:10,display:'flex',gap:6,alignItems:'center'}}><Icon n="star" s={10}/> Recommended Team</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {result.team.map((m,i)=>(
                <div key={m.emp.id} className={`fade-up fade-up-${i+1}`} style={{background:'var(--surface-alpha2)',border:'1px solid rgba(200,169,110,0.15)',borderRadius:12,padding:'14px 16px',display:'flex',gap:14,alignItems:'flex-start'}}>
                  <div style={{position:'relative',flexShrink:0}}>
                    <div style={{width:40,height:40,borderRadius:11,background:'rgba(200,169,110,0.1)',border:'1px solid rgba(200,169,110,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'var(--gold)'}}>{m.emp.avatar}</div>
                    <div style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#12100c',fontWeight:700}}>#{i+1}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:6}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{m.emp.name}</div>
                        <div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{m.emp.dept} · {m.emp.seniority}</div>
                      </div>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <ScoreRing score={Math.round(m.score.totalScore)} size={46}/>
                        <div style={{textAlign:'right'}}>
                          <div style={{fontSize:11,color:'var(--gold)',fontWeight:600}}>{fmt(m.incentive)}</div>
                          <div style={{fontSize:9,color:'var(--text3)'}}>incentive</div>
                        </div>
                      </div>
                    </div>
                    {/* Score breakdown */}
                    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginTop:10}}>
                      {[
                        {l:'Skill',v:m.score.skillScore,c:'var(--gold)'},
                        {l:'Utilization',v:m.score.utilScore,c:'var(--green)'},
                        {l:'Experience',v:m.score.expScore,c:'var(--blue)'},
                        {l:'Dept Fit',v:m.score.deptScore,c:'var(--purple)'},
                      ].map(s=>(
                        <div key={s.l}>
                          <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text3)',marginBottom:3}}><span>{s.l}</span><span style={{color:s.c}}>{s.v}</span></div>
                          <Bar v={s.v} color={s.c} h={3}/>
                        </div>
                      ))}
                    </div>
                    {/* Util bar */}
                    <div style={{marginTop:8}}><Util pct={m.score.util}/></div>
                    {/* Matched skills */}
                    <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:8}}>
                      {project.skillReqs?.slice(0,4).map(r=>{
                        const empSkill=m.emp.skills.find(s=>s.skillId===r.skillId);
                        return empSkill?<SkillBadge key={r.skillId} skillId={r.skillId} level={empSkill.level} minLevel={r.minLevel}/>:null;
                      })}
                    </div>
                    <div style={{marginTop:8,fontSize:11,color:'var(--text3)'}}>Cost allocated: <span style={{color:'var(--blue)',fontWeight:600}}>{fmt(m.cost)}</span></div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* All scores (collapsed) */}
          {result.allScored.length>result.team.length&&(
            <details style={{background:'var(--card-bg)',borderRadius:10,padding:'10px 14px',border:'1px solid var(--border2)'}}>
              <summary style={{fontSize:12,color:'var(--text3)',cursor:'pointer',display:'flex',gap:6,alignItems:'center'}}><Icon n="chevron" s={12}/> All candidate scores ({result.allScored.length} evaluated)</summary>
              <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:6}}>
                {result.allScored.map(c=>{
                  const inTeam=result.team.find(m=>m.emp.id===c.emp.id);
                  return(
                    <div key={c.emp.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 8px',borderRadius:7,background:inTeam?'rgba(126,201,140,0.06)':'transparent'}}>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <div style={{width:24,height:24,borderRadius:'50%',background:'rgba(200,169,110,0.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'var(--gold)',fontWeight:700}}>{c.emp.avatar}</div>
                        <div>
                          <span style={{fontSize:12,color:'var(--text)'}}>{c.emp.name}</span>
                          <span style={{fontSize:10,color:'var(--text3)',marginLeft:6}}>{c.emp.seniority} · {c.score.util}% util</span>
                        </div>
                        {inTeam&&<span style={{fontSize:9,color:'var(--green)',background:'rgba(126,201,140,0.1)',borderRadius:99,padding:'1px 6px'}}>✓ Selected</span>}
                        {!c.score.mandatoryMet&&<span style={{fontSize:9,color:'var(--red)',background:'rgba(224,122,107,0.08)',borderRadius:99,padding:'1px 6px'}}>Missing mandatory skills</span>}
                      </div>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <div style={{width:80}}><Bar v={c.score.totalScore} color={c.score.totalScore>=70?'var(--green)':c.score.totalScore>=50?'var(--gold)':'var(--red)'} h={4}/></div>
                        <span style={{fontSize:12,fontWeight:700,color:c.score.totalScore>=70?'var(--green)':c.score.totalScore>=50?'var(--gold)':'var(--red)',minWidth:30,textAlign:'right'}}>{c.score.totalScore}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </details>
          )}

          {/* Why this team */}
          <div style={{background:'rgba(200,169,110,0.05)',border:'1px solid rgba(200,169,110,0.15)',borderRadius:10,padding:'12px 15px'}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--gold)',marginBottom:7,textTransform:'uppercase',letterSpacing:'0.07em'}}>Why this team?</div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {[
                `Covers ${result.coverage}% of mandatory skills between them`,
                `Avg utilization ${Math.round(result.team.reduce((a,m)=>a+m.score.util,0)/result.team.length)}% — comfortable bandwidth for this project`,
                `Team seniority mix: ${result.team.map(m=>m.emp.seniority).join(', ')}`,
                `Incentive pool of ${fmt(project.profit*0.15)} distributed by score & seniority`,
              ].map((r,i)=><div key={i} style={{fontSize:12,color:'var(--text2)',display:'flex',gap:6}}><span style={{color:'var(--gold)',flexShrink:0}}>→</span>{r}</div>)}
            </div>
          </div>

          <div style={{display:'flex',gap:8,justifyContent:'space-between'}}>
            <Btn variant="ghost" onClick={()=>setPhase('override')}><Icon n="override" s={13}/> Override Manually</Btn>
            <div style={{display:'flex',gap:8}}>
              <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
              <Btn onClick={confirm}><Icon n="check" s={13}/> Confirm & Assign Team</Btn>
            </div>
          </div>
          <div style={{fontSize:10,color:'var(--text3)',background:'rgba(224,122,107,0.05)',border:'1px solid rgba(224,122,107,0.12)',borderRadius:8,padding:'8px 12px',display:'flex',gap:6,alignItems:'flex-start'}}>
            <Icon n="alert" s={11}/> Incentive amounts are AI suggestions. After assigning, go to <strong style={{color:'var(--text2)'}}>Admin › Salary Mgmt › Incentive Caps</strong> to set or adjust hard caps per employee.
          </div>
        </div>
      )}

      {phase==='override'&&result&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:'rgba(232,147,90,0.07)',border:'1px solid rgba(232,147,90,0.2)',borderRadius:10,padding:'11px 14px',fontSize:12,color:'rgba(232,147,90,0.9)',display:'flex',gap:7,alignItems:'center'}}>
            <Icon n="override" s={13}/> Manual override mode — the AI recommendation is shown for reference. Select your team below.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {result.allScored.map(c=>{
              const sel=overrideTeam.includes(c.emp.id);
              return(
                <div key={c.emp.id} onClick={()=>setOverrideTeam(prev=>sel?prev.filter(id=>id!==c.emp.id):[...prev,c.emp.id])} style={{display:'flex',gap:12,alignItems:'center',padding:'12px 14px',background:sel?'rgba(200,169,110,0.08)':'rgba(255,255,255,0.022)',border:`1px solid ${sel?'rgba(200,169,110,0.3)':'var(--border2)'}`,borderRadius:11,cursor:'pointer',transition:'all 0.18s'}}>
                  <input type="checkbox" checked={sel} readOnly style={{flexShrink:0}}/>
                  <div style={{width:34,height:34,borderRadius:9,background:'rgba(200,169,110,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--gold)',flexShrink:0}}>{c.emp.avatar}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{c.emp.name} <span style={{fontSize:10,color:'var(--text3)'}}>· {c.emp.dept} · {c.emp.seniority}</span></div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginTop:6}}>
                      {[{l:'Skill',v:c.score.skillScore},{l:'Util',v:c.score.utilScore},{l:'Exp',v:c.score.expScore},{l:'Dept',v:c.score.deptScore}].map(s=>(
                        <div key={s.l} style={{fontSize:9,color:'var(--text3)'}}>{s.l}: <span style={{color:'var(--gold)'}}>{s.v}</span></div>
                      ))}
                    </div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:16,fontWeight:700,color:c.score.totalScore>=70?'var(--green)':c.score.totalScore>=50?'var(--gold)':'var(--red)',fontFamily:'var(--fd)'}}>{c.score.totalScore}</div>
                    <div style={{fontSize:9,color:'var(--text3)'}}>score</div>
                    {!c.score.mandatoryMet&&<div style={{fontSize:9,color:'var(--red)'}}>Missing skills</div>}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'space-between'}}>
            <Btn variant="secondary" onClick={()=>setPhase('results')}>← Back to AI Recommendation</Btn>
            <Btn onClick={confirm} disabled={overrideTeam.length===0}><Icon n="check" s={13}/> Confirm Override ({overrideTeam.length} selected)</Btn>
          </div>
        </div>
      )}

      {confirmed&&(
        <div style={{padding:'40px 20px',display:'flex',flexDirection:'column',alignItems:'center',gap:12,textAlign:'center'}}>
          <div style={{width:52,height:52,borderRadius:'50%',background:'rgba(126,201,140,0.15)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon n="check" s={24}/></div>
          <div style={{fontSize:17,fontWeight:600,color:'var(--green)'}}>Team Assigned Successfully!</div>
          <div style={{fontSize:12,color:'var(--text3)'}}>Project team saved. KPI tracking and incentive calculations are now active for all assigned members.</div>
        </div>
      )}
    </Modal>
  );
};

// ═══════════════════════════════════════════════════════════════════════════
// TIMESHEET PAGE — aligned with Creospace_Timesheet_Tracker.xlsx Daily Log
// ═══════════════════════════════════════════════════════════════════════════
const TsPage=({user,timesheets,setTimesheets,projects,isHod,toast})=>{
  const [showModal,setShowModal]=useState(false);
  const [fUser,setFUser]=useState(String(user.id));
  const [viewMode,setViewMode]=useState('log'); // log | summary
  const blankForm={projectId:'',date:today,phaseCode:'',activityCode:'',hours:'',notes:''};
  const [form,setForm]=useState(blankForm);

  // Derive billable from activity code
  const actInfo=ACTIVITY_CODES.find(a=>a.code===form.activityCode);
  const isBillable=actInfo?.billable??false;

  const visible=isHod
    ?(fUser==='all'?timesheets:timesheets.filter(t=>t.userId===Number(fUser)))
    :timesheets.filter(t=>t.userId===user.id);

  // Check if daily total for a user/date meets ≥8h
  const dailyTotal=(userId,date)=>timesheets.filter(t=>t.userId===userId&&t.date===date).reduce((a,t)=>a+t.billingHours+t.nonBillingHours,0);

  const save=()=>{
    if(!form.projectId||!form.date||!form.activityCode||!form.hours)return;
    const hrs=Number(form.hours)||0;
    const billable=ACTIVITY_CODES.find(a=>a.code===form.activityCode)?.billable??false;
    const actName=ACTIVITY_CODES.find(a=>a.code===form.activityCode)?.name||form.activityCode;
    const newEntry={
      id:Date.now(),userId:user.id,projectId:form.projectId,date:form.date,
      phaseCode:form.phaseCode,activityCode:form.activityCode,
      billingHours:billable?hrs:0,nonBillingHours:billable?0:hrs,
      activity:actName,notes:form.notes
    };
    setTimesheets(prev=>[newEntry,...prev]);
    setShowModal(false);
    toast('Timesheet entry saved!');
    setForm(blankForm);
  };

  const grouped=visible.reduce((acc,t)=>{if(!acc[t.date])acc[t.date]=[];acc[t.date].push(t);return acc;},{});

  // Monthly utilization summary per person
  const monthSummary=()=>{
    const months={};
    timesheets.forEach(t=>{
      const mo=t.date.slice(0,7);
      if(!months[mo])months[mo]={};
      if(!months[mo][t.userId])months[mo][t.userId]={bill:0,nonBill:0};
      months[mo][t.userId].bill+=t.billingHours;
      months[mo][t.userId].nonBill+=t.nonBillingHours;
    });
    return months;
  };
  const summary=monthSummary();

  const totalBill=visible.reduce((a,t)=>a+t.billingHours,0);
  const totalNonBill=visible.reduce((a,t)=>a+t.nonBillingHours,0);
  const totalH=totalBill+totalNonBill;
  const utilPct=totalH>0?Math.round((totalBill/totalH)*100):0;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:18}}>

      {/* Header row */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {/* View toggle */}
          <div style={{display:'flex',background:'var(--tag-bg)',borderRadius:9,padding:3,gap:2}}>
            {[{id:'log',l:'📋 Daily Log'},{id:'summary',l:'📊 Monthly Summary'}].map(v=>(
              <button key={v.id} onClick={()=>setViewMode(v.id)} style={{padding:'6px 13px',borderRadius:7,border:'none',background:viewMode===v.id?'var(--modal-bg)':'transparent',color:viewMode===v.id?'var(--gold)':'var(--text3)',fontSize:12,fontFamily:'var(--fb)',fontWeight:viewMode===v.id?600:400,cursor:'pointer',whiteSpace:'nowrap'}}>{v.l}</button>
            ))}
          </div>
          {isHod&&<Sel value={fUser} onChange={e=>setFUser(e.target.value)} style={{width:150}}>
            <option value="all">All Team</option>
            {USERS.filter(u=>u.role!=='admin').map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </Sel>}
        </div>
        <Btn onClick={()=>setShowModal(true)}><Icon n="plus" s={13}/> Log Entry</Btn>
      </div>

      {/* KPI stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10}}>
        {[
          {l:'Total Hours',v:`${totalH}h`,c:'var(--gold)'},
          {l:'Billing',v:`${totalBill}h`,c:'var(--green)'},
          {l:'Non-Billing',v:`${totalNonBill}h`,c:'var(--purple)'},
          {l:'Utilization',v:`${utilPct}%`,c:utilPct>=85?'var(--green)':utilPct>=70?'var(--gold)':'var(--red)'},
          {l:'Days Logged',v:Object.keys(grouped).length,c:'var(--blue)'},
        ].map(s=>(
          <div key={s.l} style={{background:'var(--surface-alpha2)',border:'1px solid var(--border2)',borderRadius:12,padding:'11px 14px',textAlign:'center'}}>
            <div style={{fontSize:20,fontWeight:700,color:s.c,fontFamily:'var(--fd)'}}>{s.v}</div>
            <div style={{fontSize:9,color:'var(--text3)',marginTop:3,textTransform:'uppercase',letterSpacing:'0.08em'}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Target indicator */}
      <div style={{background:'rgba(200,169,110,0.05)',border:'1px solid rgba(200,169,110,0.14)',borderRadius:10,padding:'8px 14px',display:'flex',gap:16,alignItems:'center',flexWrap:'wrap',fontSize:11,color:'var(--text3)'}}>
        <span>🟢 ≥ 85% On Track</span><span>🟡 70–84% Good</span><span>🔴 &lt; 70% Needs Attention</span>
        <span style={{marginLeft:'auto',color:'var(--gold)'}}>Target: ≥ 70% billable utilization | Submit by 7:00 PM daily</span>
      </div>

      {/* ── DAILY LOG VIEW ── */}
      {viewMode==='log'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {Object.entries(grouped).sort(([a],[b])=>b.localeCompare(a)).map(([date,entries])=>{
            const uid=entries[0]?.userId;
            const dtotal=dailyTotal(uid,date);
            const hoursOk=dtotal>=8;
            return(
              <div key={date} style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:13,overflow:'hidden'}}>
                <div style={{padding:'10px 17px',borderBottom:'1px solid var(--border3)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
                  <span style={{fontSize:13,fontWeight:600,color:'var(--gold)'}}>{new Date(date+'T12:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short',year:'numeric'})}</span>
                  <div style={{display:'flex',gap:10,alignItems:'center'}}>
                    <span style={{fontSize:11,color:'var(--text3)'}}>{entries.reduce((a,t)=>a+t.billingHours+t.nonBillingHours,0)}h logged</span>
                    <span style={{fontSize:10,padding:'2px 8px',borderRadius:99,background:hoursOk?'rgba(126,201,140,0.12)':'rgba(224,122,107,0.1)',color:hoursOk?'var(--green)':'var(--red)',border:`1px solid ${hoursOk?'rgba(126,201,140,0.3)':'rgba(224,122,107,0.25)'}`,fontWeight:600}}>
                      {hoursOk?'✓ Hours OK':'⚠ < 8h'}
                    </span>
                  </div>
                </div>
                {/* Table header */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px 70px 60px 60px',gap:0,padding:'7px 17px',borderBottom:'1px solid var(--border3)',background:'var(--surface-alpha2)'}}>
                  {['Project','Phase','Activity','Description','Notes','Hrs','Billable'].map(h=>(
                    <div key={h} style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.07em',fontWeight:600}}>{h}</div>
                  ))}
                </div>
                {entries.map(e=>{
                  const proj=[...projects,...INIT_PROJECTS].find(p=>p.id===e.projectId);
                  const act=ACTIVITY_CODES.find(a=>a.code===e.activityCode);
                  const phase=PHASES_DB.find(p=>p.code===e.phaseCode);
                  const hrs=e.billingHours+e.nonBillingHours;
                  const billable=e.billingHours>0;
                  return(
                    <div key={e.id} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px 90px 70px 60px 60px',gap:0,padding:'10px 17px',borderBottom:'1px solid var(--border3)',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{proj?.name||e.projectId}</div>
                        <div style={{fontSize:10,color:'var(--text3)'}}>{e.projectId}</div>
                      </div>
                      <div style={{fontSize:10}}>{e.phaseCode?<span style={{background:'var(--tag-bg)',border:'1px solid var(--tag-border)',borderRadius:5,padding:'2px 6px',color:'var(--text2)'}}>{e.phaseCode}</span>:<span style={{color:'var(--text3)'}}>—</span>}</div>
                      <div>
                        <div style={{fontSize:10,fontWeight:600,color:'var(--text)'}}>{e.activityCode||'—'}</div>
                        <div style={{fontSize:9,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:76}}>{act?.name||e.activity}</div>
                      </div>
                      <div style={{fontSize:10,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}}>{e.activity}</div>
                      <div style={{fontSize:10,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.notes||'—'}</div>
                      <div style={{fontSize:14,fontWeight:700,color:billable?'var(--green)':'var(--purple)'}}>{hrs}h</div>
                      <div>
                        <span style={{fontSize:10,padding:'2px 6px',borderRadius:99,background:billable?'rgba(126,201,140,0.1)':'rgba(164,130,220,0.1)',color:billable?'var(--green)':'var(--purple)',border:`1px solid ${billable?'rgba(126,201,140,0.25)':'rgba(164,130,220,0.25)'}`}}>
                          {billable?'Yes':'No'}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* ── MONTHLY SUMMARY VIEW ── */}
      {viewMode==='summary'&&(
        <div style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:14,overflow:'hidden'}}>
          <div style={{padding:'13px 18px',borderBottom:'1px solid var(--border2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h3 style={{margin:0,fontSize:14,fontFamily:'var(--fd)',color:'var(--text)'}}>Monthly Utilization Summary</h3>
            <div style={{fontSize:11,color:'var(--text3)'}}>Auto-calculated from Daily Log</div>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border2)',background:'var(--surface-alpha2)'}}>
                  {['#','Employee','Role','Metric',...Object.keys(summary).sort(),'FY Total'].map(h=>(
                    <th key={h} style={{padding:'9px 13px',textAlign:'left',color:'var(--text3)',fontWeight:500,fontSize:10,textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {USERS.filter(u=>u.role!=='admin').map((u,idx)=>{
                  const months=Object.keys(summary).sort();
                  const fyBill=months.reduce((a,mo)=>a+(summary[mo]?.[u.id]?.bill||0),0);
                  const fyNonBill=months.reduce((a,mo)=>a+(summary[mo]?.[u.id]?.nonBill||0),0);
                  const fyTotal=fyBill+fyNonBill;
                  const fyUtil=fyTotal>0?Math.round((fyBill/fyTotal)*100):0;
                  return[
                    ['Total Hours',mo=>((summary[mo]?.[u.id]?.bill||0)+(summary[mo]?.[u.id]?.nonBill||0)),fyTotal,'var(--text2)'],
                    ['Billable Hrs',mo=>(summary[mo]?.[u.id]?.bill||0),fyBill,'var(--green)'],
                    ['Non-Billable',mo=>(summary[mo]?.[u.id]?.nonBill||0),fyNonBill,'var(--purple)'],
                    ['Utilization %',mo=>{const b=summary[mo]?.[u.id]?.bill||0;const t=b+(summary[mo]?.[u.id]?.nonBill||0);return t>0?Math.round((b/t)*100)+'%':'—';},fyUtil+'%',fyUtil>=85?'var(--green)':fyUtil>=70?'var(--gold)':'var(--red)'],
                  ].map(([metric,valFn,fyVal,col],ri)=>(
                    <tr key={`${u.id}-${metric}`} style={{borderBottom:'1px solid var(--border3)',background:ri===3?'rgba(200,169,110,0.03)':'transparent'}}>
                      {ri===0&&<td rowSpan={4} style={{padding:'10px 13px',color:'var(--text3)',fontWeight:600,verticalAlign:'middle',borderRight:'1px solid var(--border3)'}}>{idx+1}</td>}
                      {ri===0&&<td rowSpan={4} style={{padding:'10px 13px',verticalAlign:'middle',borderRight:'1px solid var(--border3)'}}>
                        <div style={{display:'flex',gap:7,alignItems:'center'}}>
                          <div style={{width:26,height:26,borderRadius:'50%',background:'rgba(200,169,110,0.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'var(--gold)',flexShrink:0}}>{u.avatar}</div>
                          <div><div style={{fontSize:12,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap'}}>{u.name}</div><div style={{fontSize:9,color:'var(--text3)'}}>{u.excelName||u.dept}</div></div>
                        </div>
                      </td>}
                      {ri===0&&<td rowSpan={4} style={{padding:'10px 13px',verticalAlign:'middle',borderRight:'1px solid var(--border3)'}}><Badge text={u.role} type={u.role}/></td>}
                      <td style={{padding:'6px 13px',color:'var(--text3)',fontSize:11,whiteSpace:'nowrap'}}>{metric}</td>
                      {months.map(mo=>(
                        <td key={mo} style={{padding:'6px 13px',textAlign:'right',color:ri===3?(Number(String(valFn(mo)).replace('%',''))>=85?'var(--green)':Number(String(valFn(mo)).replace('%',''))>=70?'var(--gold)':'var(--red)'):'var(--text2)',fontWeight:ri===3?700:400,whiteSpace:'nowrap'}}>{String(valFn(mo))||'—'}</td>
                      ))}
                      <td style={{padding:'6px 13px',textAlign:'right',color:col,fontWeight:700,borderLeft:'1px solid var(--border3)',whiteSpace:'nowrap'}}>{fyVal||'—'}</td>
                    </tr>
                  ));
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── ADD ENTRY MODAL — Excel Daily Log format ── */}
      <Modal open={showModal} onClose={()=>setShowModal(false)} title="📋 Log Daily Timesheet Entry" width={580}>
        <div style={{display:'flex',flexDirection:'column',gap:13}}>
          {/* Excel-style info */}
          <div style={{background:'rgba(200,169,110,0.06)',border:'1px solid rgba(200,169,110,0.16)',borderRadius:9,padding:'9px 13px',fontSize:11,color:'var(--text3)',display:'flex',gap:7,alignItems:'center'}}>
            <Icon n="alert" s={12}/> Submit by 7:00 PM daily. Log each project separately. Daily total should be ≥ 8 hours.
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <Fld label="Date"><Inp type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></Fld>
            <Fld label="Project Code">
              <Sel value={form.projectId} onChange={e=>setForm(f=>({...f,projectId:e.target.value}))}>
                <option value="">Select project…</option>
                {projects.map(p=><option key={p.id} value={p.id}>{p.id} — {p.name}</option>)}
              </Sel>
            </Fld>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <Fld label="Phase Code">
              <Sel value={form.phaseCode} onChange={e=>setForm(f=>({...f,phaseCode:e.target.value}))}>
                <option value="">Select phase…</option>
                {PHASES_DB.map(p=><option key={p.code} value={p.code}>{p.code} — {p.name}</option>)}
              </Sel>
            </Fld>
            <Fld label="Activity Code">
              <Sel value={form.activityCode} onChange={e=>setForm(f=>({...f,activityCode:e.target.value}))}>
                <option value="">Select activity…</option>
                <optgroup label="── Billable ──">
                  {ACTIVITY_CODES.filter(a=>a.billable).map(a=><option key={a.code} value={a.code}>{a.code} — {a.name}</option>)}
                </optgroup>
                <optgroup label="── Non-Billable ──">
                  {ACTIVITY_CODES.filter(a=>!a.billable).map(a=><option key={a.code} value={a.code}>{a.code} — {a.name}</option>)}
                </optgroup>
              </Sel>
            </Fld>
          </div>

          {/* Billable indicator — auto-derived */}
          {form.activityCode&&(
            <div style={{background:isBillable?'rgba(126,201,140,0.08)':'rgba(164,130,220,0.08)',border:`1px solid ${isBillable?'rgba(126,201,140,0.25)':'rgba(164,130,220,0.25)'}`,borderRadius:9,padding:'8px 13px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:'var(--text2)'}}>{actInfo?.name}</span>
              <span style={{fontSize:11,fontWeight:700,color:isBillable?'var(--green)':'var(--purple)',padding:'2px 9px',background:isBillable?'rgba(126,201,140,0.12)':'rgba(164,130,220,0.12)',borderRadius:99}}>
                {isBillable?'✓ Billable':'✗ Non-Billable'}
              </span>
            </div>
          )}

          <Fld label="Hours Logged">
            <Inp type="number" min="0.5" max="12" step="0.5" value={form.hours} onChange={e=>setForm(f=>({...f,hours:e.target.value}))} placeholder="e.g. 3"/>
          </Fld>
          <Fld label="Notes / Task Description">
            <Txta value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="e.g. Ground floor plan – revision 2"/>
          </Fld>

          {/* Daily total preview */}
          {form.date&&(()=>{
            const existingHrs=dailyTotal(user.id,form.date);
            const newTotal=existingHrs+(Number(form.hours)||0);
            return(
              <div style={{background:'var(--surface-alpha2)',borderRadius:9,padding:'9px 13px',display:'flex',justifyContent:'space-between',fontSize:11}}>
                <span style={{color:'var(--text3)'}}>Daily total after this entry:</span>
                <span style={{color:newTotal>=8?'var(--green)':'var(--gold)',fontWeight:700}}>{newTotal}h {newTotal>=8?'✓ OK':'(target: 8h)'}</span>
              </div>
            );
          })()}

          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
            <Btn variant="secondary" onClick={()=>setShowModal(false)}>Cancel</Btn>
            <Btn onClick={save} disabled={!form.projectId||!form.date||!form.activityCode||!form.hours}><Icon n="check" s={13}/> Save Entry</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
};

// KPI PAGE
// ═══════════════════════════════════════════════════════════════════════════
const KpiPage=({user,projects,timesheets,isHod})=>{
  const kd=projects.map(p=>{
    const ts=timesheets.filter(t=>t.projectId===p.id);
    const th=ts.reduce((a,t)=>a+t.billingHours+t.nonBillingHours,0);
    const bh=ts.reduce((a,t)=>a+t.billingHours,0);
    const br=th?Math.round((bh/th)*100):0;
    const ot=p.completion>=50&&new Date(p.deadline)>=new Date();
    const ip=p.completion>=100?100:p.completion>=75?75:p.completion>=50?50:25;
    return{...p,th,bh,br,ot,ip};
  });
  const metrics=[
    {l:'Billing Efficiency',v:kd.length?Math.round(kd.reduce((a,k)=>a+k.br,0)/kd.length):0,t:75,u:'%',d:'Billing hrs / Total hrs'},
    {l:'Project Completion',v:kd.length?Math.round(kd.reduce((a,k)=>a+k.completion,0)/kd.length):0,t:80,u:'%',d:'Avg across active projects'},
    {l:'On-Time Delivery',v:kd.length?Math.round((kd.filter(k=>k.ot).length/kd.length)*100):0,t:90,u:'%',d:'Within stipulated deadline'},
    {l:'Incentive Achievement',v:kd.length?Math.round(kd.reduce((a,k)=>a+k.ip,0)/kd.length):0,t:80,u:'%',d:'% of max incentive earned'},
  ];
  const months=['Oct','Nov','Dec','Jan','Feb','Mar'];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <p style={{margin:0,fontSize:12,color:'var(--text3)'}}>KPI auto-calculated from timesheets & project progress. Updated month-on-month.</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
        {metrics.map(k=>{
          const pct=Math.min((k.v/k.t)*100,100);
          const c=pct>=100?'var(--green)':pct>=75?'var(--gold)':'var(--red)';
          return(
            <div key={k.l} style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:15,padding:'16px 18px',display:'flex',flexDirection:'column',gap:11}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{k.l}</div>
                <div style={{fontSize:22,fontWeight:700,color:c,fontFamily:'var(--fd)'}}>{k.v}{k.u}</div>
              </div>
              <Bar v={k.v} max={k.t} color={c} h={7}/>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)'}}>
                <span>{k.d}</span><span>Target: {k.t}{k.u}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:14,overflow:'hidden'}}>
        <div style={{padding:'13px 17px',borderBottom:'1px solid var(--border2)'}}><h3 style={{margin:0,fontSize:14,fontFamily:'var(--fd)',color:'var(--text)'}}>Month-on-Month KPI</h3></div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{borderBottom:'1px solid var(--border2)'}}><th style={{padding:'9px 16px',textAlign:'left',color:'var(--text3)',fontWeight:500,fontSize:10,textTransform:'uppercase'}}>Metric</th>{months.map(m=><th key={m} style={{padding:'9px 13px',textAlign:'right',color:'var(--text3)',fontWeight:500,fontSize:10,textTransform:'uppercase'}}>{m}</th>)}</tr></thead>
            <tbody>{metrics.map((k,i)=>{
              const hist=months.map((_,mi)=>Math.max(30,Math.min(100,k.v-(5-mi)*4+(i+mi)%7)));
              return(
                <tr key={k.l} style={{borderBottom:'1px solid var(--border3)'}}>
                  <td style={{padding:'11px 16px',color:'var(--text)',fontWeight:500}}>{k.l}</td>
                  {hist.map((v,mi)=>{const c=v>=k.t?'var(--green)':v>=k.t*0.8?'var(--gold)':'var(--red)';const il=mi===months.length-1;return <td key={mi} style={{padding:'11px 13px',textAlign:'right',color:il?c:'var(--text3)',fontWeight:il?700:400}}>{v}{k.u}</td>;})}
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>
      <div style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:14,overflow:'hidden'}}>
        <div style={{padding:'13px 17px',borderBottom:'1px solid var(--border2)'}}><h3 style={{margin:0,fontSize:14,fontFamily:'var(--fd)',color:'var(--text)'}}>Project KPI Breakdown</h3></div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{borderBottom:'1px solid var(--border2)'}}>{['Project','Phase','Completion','Bill Rate','On-Time','Incentive %','Status'].map(h=><th key={h} style={{padding:'9px 13px',textAlign:'left',color:'var(--text3)',fontWeight:500,fontSize:10,textTransform:'uppercase'}}>{h}</th>)}</tr></thead>
            <tbody>{kd.map(k=>(
              <tr key={k.id} style={{borderBottom:'1px solid var(--border3)'}}>
                <td style={{padding:'11px 13px',color:'var(--text)',fontWeight:600,maxWidth:160}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{k.name}</div></td>
                <td style={{padding:'11px 13px',color:'var(--text3)',fontSize:11}}>{k.phase}</td>
                <td style={{padding:'11px 13px'}}><div style={{display:'flex',gap:7,alignItems:'center'}}><div style={{width:55}}><Bar v={k.completion} color={k.completion>=50?'var(--green)':'var(--gold)'} h={4}/></div><span style={{color:'var(--gold)',fontWeight:600}}>{k.completion}%</span></div></td>
                <td style={{padding:'11px 13px',color:k.br>=75?'var(--green)':'var(--gold)',fontWeight:600}}>{k.br}%</td>
                <td style={{padding:'11px 13px',color:k.ot?'var(--green)':'var(--red)'}}>{k.ot?'✓ Yes':'✗ Risk'}</td>
                <td style={{padding:'11px 13px',color:'var(--purple)',fontWeight:600}}>{k.ip}%</td>
                <td style={{padding:'11px 13px'}}><Badge text={k.status} type={k.status}/></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// SALARY PAGE
// ═══════════════════════════════════════════════════════════════════════════
const SalaryPage=({user,projects,base,inc,isHod,allProj,users})=>{
  const [vid,setVid]=useState(user.id);
  const sel=(users||USERS).find(u=>u.id===Number(vid))||user;
  const sp=isHod?allProj.filter(p=>p.assignedTeam?.includes(sel.id)):projects;
  const sb=sel.salary;

  // CAPPED: earned per project never exceeds the admin-set cap
  const calcEarned=(p,uid)=>{
    const cap=p.targetIncentive?.[uid]||0;
    if(!cap) return 0;
    const raw=Math.round(cap*(p.completion/100));
    return Math.min(raw, cap); // hard cap
  };
  const si=sp.reduce((s,p)=>s+calcEarned(p,sel.id),0);
  const totalMaxInc=sp.reduce((s,p)=>s+(p.targetIncentive?.[sel.id]||0),0);
  const capPct=totalMaxInc>0?Math.round((si/totalMaxInc)*100):0;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <p style={{margin:0,fontSize:12,color:'var(--text3)'}}>Real-time salary tracker — incentives are capped per project by Admin</p>
        {isHod&&<Sel value={vid} onChange={e=>setVid(Number(e.target.value))} style={{width:200}}>{(users||USERS).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</Sel>}
      </div>

      {/* Earnings Banner */}
      <div style={{background:'var(--banner-bg)',border:'1px solid rgba(200,169,110,0.2)',borderRadius:18,padding:'24px 28px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
        <div>
          <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>Total Earnings — April 2025</div>
          <div style={{fontSize:44,fontFamily:'var(--fd)',color:'var(--gold)',fontWeight:700,letterSpacing:'-0.02em'}}>{fmt(sb+si)}</div>
          <div style={{display:'flex',gap:22,marginTop:10,flexWrap:'wrap'}}>
            <div><div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Fixed Salary</div><div style={{fontSize:18,fontWeight:600,color:'var(--green)'}}>{fmt(sb)}</div></div>
            <div><div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Incentives Earned</div><div style={{fontSize:18,fontWeight:600,color:'var(--purple)'}}>{fmt(si)}</div></div>
            <div><div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Max Possible</div><div style={{fontSize:18,fontWeight:600,color:'var(--blue)'}}>{fmt(totalMaxInc)}</div></div>
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          {/* Incentive cap meter */}
          <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Incentive Cap Usage</div>
          <div style={{width:120}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
              <span style={{color:'var(--text3)'}}>Earned</span>
              <span style={{color:'var(--gold)',fontWeight:700}}>{capPct}%</span>
            </div>
            <Bar v={capPct} color={capPct>=100?'var(--green)':capPct>=70?'var(--gold)':'var(--blue)'} h={8}/>
            <div style={{fontSize:9,color:'var(--text3)',marginTop:3,textAlign:'right'}}>{fmt(si)} of {fmt(totalMaxInc)} cap</div>
          </div>
          <div style={{fontSize:10,color:'rgba(224,122,107,0.7)',marginTop:8,background:'rgba(224,122,107,0.07)',borderRadius:7,padding:'3px 9px',display:'inline-block'}}>🔒 Admin-set salary &amp; cap</div>
        </div>
      </div>

      {/* Project incentive rows */}
      <div style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:14,overflow:'hidden'}}>
        <div style={{padding:'13px 17px',borderBottom:'1px solid var(--border2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{margin:0,fontSize:14,fontFamily:'var(--fd)',color:'var(--text)'}}>Project-Wise Incentive Breakdown</h3>
          <div style={{fontSize:11,color:'var(--text3)',display:'flex',gap:6,alignItems:'center'}}>
            <span style={{width:8,height:8,borderRadius:'50%',background:'var(--red)',display:'inline-block'}}/>Cap enforced per project
          </div>
        </div>
        {sp.map(p=>{
          const cap=p.targetIncentive?.[sel.id]||0;
          const raw=cap?Math.round(cap*(p.completion/100)):0;
          const earned=Math.min(raw,cap);
          const isAtCap=earned>=cap&&cap>0;
          const cost=p.costPerEmployee?.[sel.id]||0;
          const pct=cap>0?Math.round((earned/cap)*100):0;
          return(
            <div key={p.id} style={{padding:'15px 17px',borderBottom:'1px solid var(--border3)',display:'flex',flexDirection:'column',gap:9}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:7}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{p.name}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{p.client} · {p.phase}</div>
                  <div style={{marginTop:4,display:'flex',gap:4,flexWrap:'wrap'}}>
                    <Badge text={p.status} type={p.status}/>
                    {isAtCap&&<span style={{fontSize:9,color:'var(--green)',background:'rgba(126,201,140,0.1)',borderRadius:99,padding:'1px 7px',border:'1px solid rgba(126,201,140,0.25)'}}>✓ Cap Reached</span>}
                    {cap===0&&<span style={{fontSize:9,color:'var(--text3)',background:'var(--tag-bg)',borderRadius:99,padding:'1px 7px'}}>No incentive set</span>}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:20,fontWeight:700,color:isAtCap?'var(--green)':'var(--purple)'}}>{fmt(earned)}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>cap: {fmt(cap)}</div>
                  <div style={{fontSize:10,color:'var(--gold)',marginTop:2}}>{pct}% of cap used</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:7}}>
                {[
                  {l:'Completion',v:`${p.completion}%`,c:p.completion>=50?'var(--green)':'var(--gold)'},
                  {l:'Cost Allocated',v:fmt(cost),c:'var(--blue)'},
                  {l:'Incentive Cap',v:fmt(cap),c:'var(--red)'},
                  {l:'Earned',v:fmt(earned),c:isAtCap?'var(--green)':'var(--purple)'},
                ].map(s=>(
                  <div key={s.l} style={{background:'var(--surface-alpha2)',borderRadius:8,padding:'6px 10px'}}>
                    <div style={{fontSize:9,color:'var(--text3)',textTransform:'uppercase'}}>{s.l}</div>
                    <div style={{fontSize:12,fontWeight:700,color:s.c}}>{s.v}</div>
                  </div>
                ))}
              </div>
              {/* Progress to cap */}
              <div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:3}}>
                  <span>Progress towards cap</span>
                  <span style={{color:isAtCap?'var(--green)':'var(--gold)'}}>{pct}%{isAtCap?' · 🔒 Capped':''}</span>
                </div>
                <Bar v={pct} color={isAtCap?'var(--green)':pct>=70?'var(--gold)':'var(--blue)'} h={6}/>
                {!isAtCap&&cap>0&&<div style={{fontSize:9,color:'rgba(200,169,110,0.45)',marginTop:3}}>{fmt(cap-earned)} remaining to reach cap</div>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Projection */}
      <div style={{background:'var(--card-bg)',border:'1px solid var(--border2)',borderRadius:14,padding:'16px 20px'}}>
        <h3 style={{margin:'0 0 12px',fontSize:14,fontFamily:'var(--fd)',color:'var(--text)'}}>Q2 2025 Projection</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:10}}>
          {[
            {l:'Base (3mo)',v:fmt(sb*3),c:'var(--green)'},
            {l:'Max Incentives Q2',v:fmt(totalMaxInc),c:'var(--red)'},
            {l:'Projected Q2',v:fmt(sb*3+si),c:'var(--gold)'},
            {l:'Annual Run Rate',v:fmt((sb+si)*12),c:'var(--blue)'},
          ].map(s=>(
            <div key={s.l} style={{background:'var(--surface-alpha2)',borderRadius:11,padding:'12px 13px',textAlign:'center'}}>
              <div style={{fontSize:14,fontWeight:700,color:s.c,fontFamily:'var(--fd)'}}>{s.v}</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{s.l}</div>
            </div>
          ))}
        </div>
        {totalMaxInc>0&&<div style={{marginTop:12,padding:'10px 14px',background:'rgba(224,122,107,0.06)',border:'1px solid rgba(224,122,107,0.15)',borderRadius:9,fontSize:11,color:'rgba(224,122,107,0.8)',display:'flex',gap:7,alignItems:'center'}}>
          <Icon n="alert" s={12}/> Total incentive cap across all projects: <strong>{fmt(totalMaxInc)}</strong>. Earnings cannot exceed this regardless of completion.
        </div>}
      </div>
    </div>
  );
};
